<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <!-- HEAD -->
    <head th:fragment="head">
        <title>Sistema Inventario</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
        <style>
            body{
                background:#1f2933;
                color:white;
            }
            .navbar{
                background:#111827;
            }
            .card{
                background:#2d3748;
                border:none;
                color:white;
            }
            .card:hover{
                background:#374151;
            }
            .footer{
                background:#111827;
            }
        </style>
    </head>

    <!-- NAVBAR -->
    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" th:href="@{/home}">
                    Sistema Inventario
                </a>
                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fa-solid fa-box"></i> Catálogo
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fa-solid fa-magnifying-glass"></i> Consultas
                            </a>
                        </li>
                    </ul>
                    <div>
                        <span class="me-3" sec:authentication="name"></span>
                        <a class="btn btn-danger btn-sm" th:href="@{/logout}">
                            Cerrar sesión
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- FOOTER -->
    <footer th:fragment="footer" class="footer text-center p-3 mt-5">
        Sistema Inventario © 2026
    </footer>

</html>
