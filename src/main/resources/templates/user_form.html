<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario de Usuario</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-dark text-white">
        <div class="container mt-5">
            <h2 th:text="${user.id == null ? 'Crear Usuario' : 'Editar Usuario'}">Formulario Usuario</h2>

            <form th:action="@{/users/save}" th:object="${user}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label>Nombre de Usuario</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" class="form-control" 
                           th:required="${user.id == null}">
                    <small th:if="${user.id != null}" class="text-muted">Dejar en blanco para no cambiar</small>
                </div>

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" th:field="*{firstName}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Apellido</label>
                    <input type="text" th:field="*{lastName}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>


                <div class="mb-3">
                    <label>Rol</label>
                    <select name="roleId" class="form-control" required>
                        <option value="">Seleccione un rol</option>
                        <option value="1">ADMIN</option>
                        <option value="2">EMPLOYEE</option>
                        <option value="3">USER</option>
                    </select>
                    <small class="text-muted">Selecciona un rol</small>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/users}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </body>
</html>
