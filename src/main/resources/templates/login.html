<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Login - Inventario</title>
        <meta charset="UTF-8">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #ced4da;  
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .card {
                border: none;
                border-radius: 15px;
            }

            .card-header {
                background-color: #6c757d;
                border-radius: 15px 15px 0 0 !important;
                color: white;
                padding: 20px;
            }

            .btn-login {
                background-color: #6c757d;
                border: none;
                color: white;
                padding: 10px;
                border-radius: 25px;
                font-weight: bold;
                transition: transform 0.3s;
            }

            .btn-login:hover {
                background-color: #5a6268;
                transform: translateY(-1px);
                color: white;
            }

            .form-control {
                border-radius: 25px;
                padding: 10px 15px;
                border: 1px solid #ddd;
            }

            .form-control:focus {
                border-color: #6c757d;
                box-shadow: none;
            }
        </style>
    </head>

    <body>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div class="card">

                        <div class="card-header text-center">
                            <h3 class="mb-0">🔐 Iniciar Sesión</h3>
                            <p class="mb-0 mt-2">Sistema de Inventario</p>
                        </div>

                        <div class="card-body p-4">

                            <!-- Mensajes de error -->
                            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <strong>❌ Error!</strong> Usuario o contraseña incorrectos
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <!-- Mensaje de logout -->
                            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                                <strong>👋</strong> Has cerrado sesión correctamente
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <!-- Formulario de login -->
                            <form method="post" th:action="@{/login}">

                                <div class="mb-4">
                                    <label class="form-label fw-bold">👤 Usuario</label>
                                    <input type="text" name="username" class="form-control"
                                           placeholder="Ingresa tu usuario" required autofocus>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-bold">🔒 Contraseña</label>
                                    <input type="password" name="password" class="form-control"
                                           placeholder="Ingresa tu contraseña" required>
                                </div>

                                <button type="submit" class="btn btn-login w-100 mb-3">
                                    Iniciar Sesión
                                </button>

                                <div class="text-center text-muted">
                                    <small>Usuarios de prueba: admin / employee / user </small>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
