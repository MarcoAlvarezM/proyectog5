<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>

        <title>Inventario - Productos</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body class="bg-light">

        <div class="container mt-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3>Gestión de Productos</h3>

                </div>

                <div class="card-body">

                    <a href="/products/new" class="btn btn-success mb-3">
                        Agregar Producto
                    </a>

                    <table class="table table-striped table-hover">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Acciones</th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr th:each="product : ${products}">

                                <td th:text="${product.id}"></td>
                                <td th:text="${product.name}"></td>
                                <td th:text="${product.price}"></td>
                                <td th:text="${product.quantity}"></td>

                                <td>

                                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">
                                        Editar
                                    </a>

                                    <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm">
                                        Eliminar
                                    </a>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </body>
</html>
