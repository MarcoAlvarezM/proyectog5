<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>

        <title>Dashboard Inventario</title>
        <meta charset="UTF-8">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    </head>

    <body class="bg-light">

        <div class="container mt-5">

            <h1 class="mb-4">📊 Dashboard de Inventario</h1>

            <div class="row">

                <div class="col-md-4">

                    <div class="card text-white bg-primary mb-3">
                        <div class="card-body">

                            <h5>Total de Productos</h5>
                            <h2 th:text="${totalProducts}"></h2>

                        </div>
                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card text-white bg-success mb-3">
                        <div class="card-body">

                            <h5>Productos en Sistema</h5>
                            <h2 th:text="${totalProducts}"></h2>

                        </div>
                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card text-white bg-warning mb-3">
                        <div class="card-body">

                            <h5>Reporte Inventario</h5>

                            <a href="/inventory-report" class="btn btn-light">
                                Ver Reporte
                            </a>

                        </div>
                    </div>

                </div>

            </div>

            <hr>

            <a href="/export/excel" class="btn btn-success mb-3">
                Exportar a Excel
            </a>

            <input class="form-control mb-3" id="searchInput" type="text" placeholder="Buscar producto...">

            <h3>Lista de Productos</h3>

            <table class="table table-striped">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.quantity}"></td>
                        <td th:text="${product.price}"></td>
                    </tr>

                </tbody>

            </table>

            <hr>

            <h3>Gráfico de Inventario</h3>

            <canvas id="inventoryChart" height="100"></canvas>

        </div>

        <script th:inline="javascript">

            let products = [[${products}]];

            let names = [];
            let quantities = [];

            products.forEach(p => {
                names.push(p.name);
                quantities.push(p.quantity);
            });

            new Chart(document.getElementById("inventoryChart"), {
                type: "bar",
                data: {
                    labels: names,
                    datasets: [{
                            label: "Cantidad en Inventario",
                            data: quantities
                        }]
                }
            });

            document.getElementById("searchInput").addEventListener("keyup", function () {

                let filter = this.value.toLowerCase();
                let rows = document.querySelectorAll("tbody tr");

                rows.forEach(row => {

                    let text = row.innerText.toLowerCase();

                    if (text.includes(filter)) {
                        row.style.display = "";
                    } else {
                        row.style.display = "none";
                    }

                });

            });

        </script>

    </body>
</html>
